name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-attach-cowork-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Cowork zip
        run: |
          chmod +x scripts/build-cowork-zip.sh
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/build-cowork-zip.sh "$VERSION"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" "dist/mindpowers-cowork-v${VERSION}.zip" --clobber
